name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
      ASSET_NAME: linkedin-engage-${{ github.ref_name }}.zip
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Create extension zip
        run: |
          cd extension
          zip -r "../${ASSET_NAME}" .
          cd ..

      - name: Ensure GitHub release exists
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists."
          else
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --generate-notes
          fi

      - name: Upload asset with retry
        run: |
          for attempt in 1 2 3; do
            if gh release upload "${TAG_NAME}" "${ASSET_NAME}" --clobber; then
              echo "Uploaded ${ASSET_NAME} on attempt ${attempt}."
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to upload ${ASSET_NAME} after 3 attempts."
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Verify asset attached
        run: |
          gh release view "${TAG_NAME}" \
            --json assets \
            --jq '.assets[].name' | grep -Fx "${ASSET_NAME}"
