name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
      ASSET_NAME: linkedin-engage-${{ github.ref_name }}.zip
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Create extension zip
        run: |
          cd extension
          zip -r "../${ASSET_NAME}" .
          cd ..

      - name: Ensure GitHub release exists
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists."
          else
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --generate-notes
          fi

      - name: Upload asset with retry
        run: |
          for attempt in 1 2 3; do
            if gh release upload "${TAG_NAME}" "${ASSET_NAME}" --clobber; then
              echo "Uploaded ${ASSET_NAME} on attempt ${attempt}."
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to upload ${ASSET_NAME} after 3 attempts."
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Verify asset attached
        run: |
          gh release view "${TAG_NAME}" \
            --json assets \
            --jq '.assets[].name' | grep -Fx "${ASSET_NAME}"

  # Publishes the zipped extension to the Chrome Web Store after every release.
  #
  # Required secrets (Settings → Secrets → Actions):
  #   CHROME_EXTENSION_ID   — from the Web Store URL: .../detail/<name>/<ID>
  #   CHROME_CLIENT_ID      — OAuth 2.0 client ID from Google Cloud Console
  #   CHROME_CLIENT_SECRET  — OAuth 2.0 client secret from Google Cloud Console
  #   CHROME_REFRESH_TOKEN  — long-lived refresh token (see docs/webstore-setup.md)
  #
  # To get the refresh token (one-time, ~5 min):
  #   1. Go to https://console.cloud.google.com → APIs & Services → Credentials
  #   2. Create OAuth 2.0 Client ID (Desktop app type)
  #   3. Enable the "Chrome Web Store API" in Library
  #   4. Visit https://accounts.google.com/o/oauth2/auth?response_type=code
  #        &client_id=<YOUR_CLIENT_ID>
  #        &redirect_uri=urn:ietf:wg:oauth:2.0:oob
  #        &scope=https://www.googleapis.com/auth/chromewebstore
  #   5. Exchange the code for tokens:
  #        curl -X POST https://oauth2.googleapis.com/token \
  #          -d "code=<CODE>&client_id=<ID>&client_secret=<SECRET>
  #              &redirect_uri=urn:ietf:wg:oauth:2.0:oob&grant_type=authorization_code"
  #   6. Save the refresh_token value as CHROME_REFRESH_TOKEN secret
  publish-webstore:
    runs-on: ubuntu-latest
    needs: release
    env:
      TAG_NAME: ${{ github.ref_name }}
      ASSET_NAME: linkedin-engage-${{ github.ref_name }}.zip
    steps:
      - name: Check secrets configured
        id: secrets-check
        run: |
          if [ -z "${{ secrets.CHROME_EXTENSION_ID }}" ] || [ -z "${{ secrets.CHROME_CLIENT_ID }}" ] || \
             [ -z "${{ secrets.CHROME_CLIENT_SECRET }}" ] || [ -z "${{ secrets.CHROME_REFRESH_TOKEN }}" ]; then
            echo "Chrome Web Store secrets not configured — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download extension zip from release
        if: steps.secrets-check.outputs.skip == 'false'
        run: |
          gh release download "${TAG_NAME}" \
            --repo "${{ github.repository }}" \
            --pattern "${ASSET_NAME}" \
            --output extension.zip
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get Chrome Web Store access token
        id: token
        if: steps.secrets-check.outputs.skip == 'false'
        run: |
          RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to obtain access token. Response: $(echo "$RESPONSE" | jq 'del(.access_token)')"
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload zip to Chrome Web Store
        id: upload
        if: steps.secrets-check.outputs.skip == 'false'
        run: |
          RESPONSE=$(curl -s -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}" \
            -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -T extension.zip)
          echo "Upload response: $(echo "$RESPONSE" | jq 'del(.kind)')"
          UPLOAD_STATE=$(echo "$RESPONSE" | jq -r '.uploadState')
          ERROR_CODE=$(echo "$RESPONSE" | jq -r '.itemError[0].error_code // empty')
          if [ "$UPLOAD_STATE" = "SUCCESS" ]; then
            echo "Upload succeeded for ${{ secrets.CHROME_EXTENSION_ID }}"
          elif [ "$ERROR_CODE" = "ITEM_NOT_UPDATABLE" ]; then
            echo "Item is already in pending review or published — skipping re-upload."
          else
            echo "Upload failed. uploadState: $UPLOAD_STATE"
            echo "$RESPONSE" | jq '.itemError // empty'
            exit 1
          fi

      - name: Publish to Chrome Web Store
        if: steps.secrets-check.outputs.skip == 'false'
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}/publish" \
            -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0")
          echo "Publish response: $(echo "$RESPONSE" | jq .)"
          STATUS=$(echo "$RESPONSE" | jq -r '.status[]? // .status?' 2>/dev/null)
          echo "Status: $STATUS"
          if echo "$STATUS" | grep -qiE "OK|ITEM_PENDING_REVIEW"; then
            echo "Published. Submitted for review — typically approved in 1-3 days."
          else
            echo "Unexpected publish status: $STATUS"
            exit 1
          fi
