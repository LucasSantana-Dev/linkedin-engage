name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run lint
        if: matrix.node-version == 20

      - run: npm run typecheck
        if: matrix.node-version == 20

      - run: npm test -- --coverage --coverageReporters=text-summary --coverageReporters=json-summary
        if: matrix.node-version == 20

      - name: Comment coverage on PR
        if: matrix.node-version == 20 && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(
              fs.readFileSync('coverage/coverage-summary.json', 'utf8')
            );
            const g = summary.total;
            const fmt = (m) => `${m.pct}% (${m.covered}/${m.total})`;
            const body = [
              '### Coverage Report',
              '',
              '| Metric | Coverage |',
              '|---|---|',
              `| Statements | ${fmt(g.statements)} |`,
              `| Branches | ${fmt(g.branches)} |`,
              `| Functions | ${fmt(g.functions)} |`,
              `| Lines | ${fmt(g.lines)} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### Coverage Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - run: npm test
        if: matrix.node-version != 20
